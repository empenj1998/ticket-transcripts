<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>📄 Ticket Transcript</title>
  <style>
    body {
      font-family: "Segoe UI", sans-serif;
      background-color: #2c2f33;
      color: #dcddde;
      padding: 2rem;
    }
    .message-container {
      display: flex;
      align-items: flex-start;
      margin-bottom: 1.5rem;
    }
    .avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      margin-right: 12px;
      flex-shrink: 0;
    }
    .message-content {
      background-color: #36393f;
      border-radius: 8px;
      padding: 0.75rem 1rem;
      max-width: 800px;
      width: 100%;
      box-shadow: 0 1px 0.5px rgba(0,0,0,0.2);
    }
    .header {
      display: flex;
      align-items: center;
      margin-bottom: 0.4rem;
    }
    .author-name {
      font-weight: 600;
      color: #00aff4;
      margin-right: 0.5rem;
    }
    .timestamp {
      font-size: 0.75rem;
      color: #72767d;
    }
    .content {
      white-space: pre-wrap;
      line-height: 1.4;
    }
    .content img {
      max-width: 100%;
      border-radius: 5px;
      margin-top: 0.5rem;
    }
    .content video {
      max-width: 100%;
      border-radius: 5px;
      margin-top: 0.5rem;
    }
    a {
      color: #00b0f4;
      text-decoration: underline;
    }
    .form-header {
      margin-bottom: 2rem;
      border-left: 4px solid #43b581;
      padding-left: 1rem;
      background: #2e3136;
      padding: 1rem;
      border-radius: 6px;
    }
    .form-header strong {
      color: #fff;
    }
  </style>
</head>
<body>
  <h1>📄 Ticket Transcript</h1>
  <div id="messages">
    
        <div class='form-header'>
            <div class='transcript-title'><strong>📄 Ticket Transcript</strong> <span class='timestamp'>(19/06/2025 02:26)</span></div>
            <strong>📋 Biểu mẫu Ticket</strong><br>
            Người tạo: NJ<br>
            Email: 1@gmail.com<br>
            SĐT: 0987654321<br>
            Loại: Tài khoản<br>
            Mô tả: lag<br>
            
        </div>
        
        <div class='message-container'>
            <img src="https://cdn.discordapp.com/avatars/1365519330313371648/0265b74a9448d07a315fcbd59c13aace.png?size=1024" class='avatar' alt='avatar'>
            <div class='message-content'>
                <div class='header'><span class='author-name'>HyperFast#7423</span><span class='timestamp'>19/06/2025 02:26</span></div>
                <div class='content'><@919966636843339817></div>
            </div>
        </div>
        
        <div class='message-container'>
            <img src="https://cdn.discordapp.com/avatars/1365519330313371648/0265b74a9448d07a315fcbd59c13aace.png?size=1024" class='avatar' alt='avatar'>
            <div class='message-content'>
                <div class='header'><span class='author-name'>HyperFast#7423</span><span class='timestamp'>19/06/2025 02:26</span></div>
                <div class='content'></div>
            </div>
        </div>
        
  </div>
</body>
</html>
