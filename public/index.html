<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Ticket Transcript</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background-color: #2c2f33;
      color: #ffffff;
      padding: 20px;
    }
    .message {
      background-color: #23272a;
      border: 1px solid #99aab5;
      border-radius: 8px;
      padding: 10px;
      margin-bottom: 10px;
    }
    .author {
      font-weight: bold;
      color: #7289da;
    }
    .timestamp {
      font-size: 0.8em;
      color: #b9bbbe;
    }
    .content {
      margin-top: 5px;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <h1>Ticket Transcript</h1>
  <!-- Replace this block with generated messages -->
  <div class="message">
    <div class="author">User#0001</div>
    <div class="timestamp">2025-06-14 12:00:00</div>
    <div class="content">This is a sample message.</div>
  </div>
  <!-- End block -->
</body>
</html>
